<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кулинарная книга</title>
<script defer src="bundle.js"></script></head>
<body>
    <header class="navbar">
        <span>Мои рецепты (RxJS + Webpack)</span>
    </header>

    <main class="container">
        <button class="hero-btn" onclick="showAddForm()">
            Добавить рецепт
        </button>
 
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Поиск рецепта...">
            
            <select id="sortSelect">
                <option value="asc">Название (А-Я)</option>
                <option value="desc">Название (Я-А)</option>
            </select>
        </div>

        <div id="pagination" class="pagination-container"></div>

        <div id="recipe-list"></div>
    </main>
</body>
</html>
