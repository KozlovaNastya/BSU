<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кулинарная Книга SPA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 40px; background-color: #f9f9f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: left; }
        th { background-color: #ff7e5f; color: white; }
        tr:nth-child(even) { background-color: #fffaf9; }

        .btn { 
            display: inline-block; padding: 12px 24px; cursor: pointer; 
            background: #ff7e5f; color: white; border: none; 
            border-radius: 25px; text-transform: uppercase; font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background: #feb47b; }
        .btn-secondary { background: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="app">Загрузка приложения...</div>

    <script>
        window.navigateTo = async function(pageName) {
            const container = document.getElementById('app');
            try {
                const response = await fetch(pageName + '.html');
                if (!response.ok) throw new Error('Страница не найдена');
                const html = await response.text();
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p style="color:red">Ошибка AJAX!</p>';
                console.error(err);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            window.navigateTo('home');
        });
    </script>
</body>
</html>
